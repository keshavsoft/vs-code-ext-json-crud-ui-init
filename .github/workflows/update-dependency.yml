name: Update Dependency on Publish

on:
  repository_dispatch:
    types: [kschema_published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update dependency to latest
        run: npm install json-crud-ui-init@latest

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update json-crud-ui-init dependency" || echo "No changes to commit"
          git push
